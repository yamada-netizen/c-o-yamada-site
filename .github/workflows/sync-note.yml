name: Sync note RSS to posts.json

on:
  schedule:
    - cron: '0 * * * *'   # 毎時 0 分に実行
  workflow_dispatch: {}    # 手動トリガー(GitHub上の "Run workflow" ボタン)
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-note.yml'
      - 'scripts/fetch-note-rss.mjs'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch note RSS and write posts.json
        run: node scripts/fetch-note-rss.mjs

      - name: Commit posts.json if changed
        run: |
          if [ -n "$(git status --porcelain posts.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posts.json
            git commit -m "chore(note): update posts.json (auto)"
            git push
          else
            echo "posts.json unchanged"
          fi
