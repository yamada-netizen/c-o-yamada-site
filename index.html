<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Consulting Office YAMADA — 財務×心理で中小企業の意思決定を支援する</title>
<meta name="description" content="群馬県太田市の経営伴走型コンサルティング。財務×心理で中小企業の意思決定を支援します。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=8">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="utils.jsx"></script>
<script type="text/babel" src="sections/header.jsx"></script>
<script type="text/babel" src="sections/hero.jsx"></script>
<script type="text/babel" src="sections/features.jsx"></script>
<script type="text/babel" src="sections/business-405.jsx"></script>
<script type="text/babel" src="sections/seminar.jsx"></script>
<script type="text/babel" src="sections/about.jsx"></script>
<script type="text/babel" src="sections/cases.jsx"></script>
<script type="text/babel" src="sections/journal.jsx"></script>
<script type="text/babel" src="sections/service.jsx"></script>
<script type="text/babel" src="sections/flow.jsx"></script>
<script type="text/babel" src="sections/contact-footer.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "green-gold"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const themeMap = { 'green-gold': '', 'mono': 'mono', 'warm': 'warm' };

  React.useEffect(() => {
    document.documentElement.dataset.theme = themeMap[t.theme] || '';
  }, [t.theme]);

  return (
    <>
      <ScrollProgress/>
      <TopBar/>
      <Header/>
      <main>
        <Hero/>
        <Features/>
        <Business405/>
        <Seminar/>
        <About/>
        <Cases/>
        <Journal/>
        <Service/>
        <Flow/>
        <Contact/>
      </main>
      <Footer/>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Color Theme" />
        <TweakRadio
          label="Palette"
          value={t.theme}
          options={['green-gold', 'mono', 'warm']}
          onChange={(v) => setTweak('theme', v)}
        />
        <div style={{ padding: '8px 14px', fontSize: 11, color: '#888', lineHeight: 1.6 }}>
          <strong>green-gold</strong>: 既存ブランドの洗練版<br/>
          <strong>mono</strong>: 黒×グレー、ジャーナリスティック<br/>
          <strong>warm</strong>: 茶系・木のような温度
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
